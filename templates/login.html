<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#111827);
}

.container{

width:420px;

padding:40px;

background:rgba(17,24,39,0.85);

border-radius:25px;

box-shadow:0 0 40px rgba(0,242,254,0.25);

text-align:center;
}

h1{
color:#00f2fe;
margin-bottom:25px;
font-size:35px;
}

input{

width:100%;

height:55px;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:14px;

background:#0f172a;

color:white;

font-size:16px;
}

button{

width:100%;

height:55px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:linear-gradient(
90deg,
#00f2fe,
#4facfe
);

color:black;
}

a{

display:block;

margin-top:15px;

color:#cbd5e1;

text-decoration:none;
}

a:hover{
color:#00f2fe;
}

</style>

</head>

<body>

<div class="container">

<h1>LOGIN</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

LOGIN

</button>

</form>

<a href="/forgot_password">

Forgot Password?

</a>

<a href="/register">

Create New Account

</a>

</div>

</body>

</html>
